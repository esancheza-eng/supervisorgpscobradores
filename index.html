<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Panel Supervisor GPS Cobradores</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

#topbar{
background:#1e73be;
padding:10px;
}

button{
background:#2d89ef;
border:none;
color:white;
padding:8px 12px;
margin:4px;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#1b5fa7;
}

#panel{
padding:10px;
background:#ffffff;
}

#map{
height:70vh;
}

#activos{
color:green;
}

#sinGPS{
color:red;
}

.alerta{
background:red;
color:white;
padding:10px;
margin:5px;
border-radius:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#2d89ef;
color:white;
padding:8px;
}

td{
padding:8px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<div id="topbar">

<button onclick="verMapa()">📍 Ver Ubicación en Tiempo Real</button>

<button onclick="verActivos()">🟢 Cobradores Activos</button>

<button onclick="verSinGPS()">🔴 Sin GPS</button>

<button onclick="verDetenciones()">⚠ Tiempo Detenido</button>

<button onclick="descargarExcel()">📥 Descargar Excel</button>

</div>

<div id="panel">

<div id="alertas"></div>

<div id="info"></div>

</div>

<div id="map"></div>

<script>

var firebaseConfig = {
apiKey: "AIzaSyCW__ndth0b9jYO91QF8x6Psp7-lK1-lW4",
authDomain: "gps-cobradores.firebaseapp.com",
databaseURL: "https://gps-cobradores-default-rtdb.firebaseio.com",
projectId: "gps-cobradores"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var map = L.map('map').setView([-2.17,-79.90],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marcadores = {};
var ultimaPosicion = {};
var tiempoParado = {};

var cobradoresActivos=[];
var cobradoresSinGPS=[];

var reporte=[];

db.ref("cobradores").on("value",function(snapshot){

var datos = snapshot.val();

cobradoresActivos=[];
cobradoresSinGPS=[];
reporte=[];

document.getElementById("alertas").innerHTML="";

for(var nombre in datos){

var lat = datos[nombre].latitud;
var lon = datos[nombre].longitud;
var estado = datos[nombre].estado;
var hora = datos[nombre].hora;

if(!lat || !lon){

cobradoresSinGPS.push(nombre);
continue;

}

cobradoresActivos.push(nombre);

var posicionActual = lat+","+lon;

if(!marcadores[nombre]){

marcadores[nombre] = L.marker([lat,lon]).addTo(map);

}else{

marcadores[nombre].setLatLng([lat,lon]);

}

marcadores[nombre].bindPopup(
"<b>"+nombre+"</b><br>"+
"Estado: "+estado+"<br>"+
"Hora: "+hora
);

if(ultimaPosicion[nombre]==posicionActual){

if(!tiempoParado[nombre]){
tiempoParado[nombre]=Date.now();
}

var minutos=(Date.now()-tiempoParado[nombre])/60000;

if(minutos>25){

document.getElementById("alertas").innerHTML+=
"<div class='alerta'>⚠ "+nombre+" más de 25 minutos sin movimiento</div>";

}

}else{

ultimaPosicion[nombre]=posicionActual;
tiempoParado[nombre]=Date.now();

}

reporte.push({
nombre:nombre,
estado:estado,
hora:hora,
lat:lat,
lon:lon
});

}

});

function verMapa(){

document.getElementById("info").innerHTML="Mapa en tiempo real";

}

function verActivos(){

var texto="<h3 id='activos'>Cobradores activos</h3>";

cobradoresActivos.forEach(function(n){

texto+=n+"<br>";

});

document.getElementById("info").innerHTML=texto;

}

function verSinGPS(){

var texto="<h3 id='sinGPS'>Cobradores sin GPS</h3>";

cobradoresSinGPS.forEach(function(n){

texto+=n+"<br>";

});

document.getElementById("info").innerHTML=texto;

}

function verDetenciones(){

document.getElementById("info").innerHTML="Revisar alertas rojas arriba";

}

function descargarExcel(){

var csv="COBRADOR,ESTADO,HORA,LATITUD,LONGITUD\n";

reporte.forEach(function(c){

csv+=c.nombre+","+c.estado+","+c.hora+","+c.lat+","+c.lon+"\n";

});

var blob=new Blob([csv],{type:"text/csv"});

var url=window.URL.createObjectURL(blob);

var a=document.createElement("a");

a.href=url;
a.download="reporte_cobradores.csv";

a.click();

}

</script>

</body>

</html>
