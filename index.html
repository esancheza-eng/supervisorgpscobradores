<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor GPS Cobradores</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:20px;
}

h1{
color:#1a73e8;
}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#1a73e8;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

#mapa{
width:100%;
height:400px;
border:0;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#1a73e8;
color:white;
}

.alerta{
position:absolute;
top:20px;
left:20px;
background:#ff4d4d;
color:white;
padding:15px;
border-radius:6px;
font-weight:bold;
display:none;
z-index:1000;
}

</style>
</head>

<body>

<h1>📍 Panel Supervisor GPS Cobradores</h1>

<div>

<button onclick="verUbicacion()">📍 Ver Ubicación en Tiempo Real</button>
<button onclick="verRuta()">🗺 Ver Ruta del Cobrador</button>
<button onclick="verActividades()">📊 Actividades del Día</button>
<button onclick="filtrarDia()">📅 Filtrar por Día</button>
<button onclick="filtrarMes()">📆 Filtrar por Mes</button>
<button onclick="verTiempoDetenido()">⏱ Ver Tiempo Detenido</button>
<button onclick="verUltimaUbicacion()">📍 Última Ubicación</button>
<button onclick="activarMonitoreo()">🛰 Activar Monitoreo GPS</button>
<button onclick="descargarExcel()">📥 Descargar Excel</button>

</div>

<div style="position:relative">

<div class="alerta" id="alerta">
🚨 ALERTA DE INACTIVIDAD<br>
Cobrador: Jefferson Quiñónez<br>
Más de 25 minutos sin movimiento
</div>

<iframe id="mapa"
src="https://www.openstreetmap.org/export/embed.html?bbox=-79.59%2C-2.16%2C-79.58%2C-2.15&layer=mapnik">
</iframe>

</div>

<table id="tabla">

<thead>
<tr>
<th>Cobrador</th>
<th>Estado</th>
<th>Inicio</th>
<th>Fin</th>
<th>Duración</th>
<th>Latitud</th>
<th>Longitud</th>
</tr>
</thead>

<tbody>

<tr class="registro" data-fecha="2026-03-05">

<td>Jefferson Quiñónez</td>
<td>Finalizado</td>
<td>12:14:55</td>
<td>12:15:58</td>
<td id="duracion"></td>
<td>-2.1538102</td>
<td>-79.5865068</td>

</tr>

</tbody>

</table>

<script>

function calcularDuracion(){

let inicio="12:14:55"
let fin="12:15:58"

let a=inicio.split(":")
let b=fin.split(":")

let s1=(+a[0])*3600+(+a[1])*60+(+a[2])
let s2=(+b[0])*3600+(+b[1])*60+(+b[2])

let diff=s2-s1

let m=Math.floor(diff/60)
let s=diff%60

document.getElementById("duracion").innerHTML=m+"m "+s+"s"

}

calcularDuracion()

function filtrarDia(){

let hoy=new Date().toISOString().split('T')[0]

let filas=document.querySelectorAll(".registro")

filas.forEach(f=>{
f.style.display=f.dataset.fecha===hoy?"table-row":"none"
})

}

function filtrarMes(){

let mes=new Date().getMonth()+1

let filas=document.querySelectorAll(".registro")

filas.forEach(f=>{
f.style.display=f.dataset.fecha.includes("-"+mes+"-")?"table-row":"none"
})

}

function verUbicacion(){
alert("Mostrando ubicación actual de los cobradores")
}

function verRuta(){
alert("Mostrando ruta del cobrador")
}

function verActividades(){
alert("Mostrando actividades del día")
}

function verTiempoDetenido(){
alert("Mostrando tiempo detenido de cobradores")
}

function verUltimaUbicacion(){
alert("Mostrando última ubicación registrada")
}

function activarMonitoreo(){
alert("Monitoreo GPS activado")
}

function descargarExcel(){

let tabla=document.getElementById("tabla").outerHTML

let archivo=new Blob([tabla],{type:"application/vnd.ms-excel"})

let url=URL.createObjectURL(archivo)

let link=document.createElement("a")

link.href=url

link.download="reporte_cobradores.xls"

link.click()

}

setTimeout(function(){
document.getElementById("alerta").style.display="block"
},5000)

</script>

</body>
</html>
