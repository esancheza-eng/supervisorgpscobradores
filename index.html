<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor GPS Cobradores</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

#panel{
width:330px;
background:#0f172a;
color:white;
overflow:auto;
padding:15px;
}

#map{
flex:1;
}

.card{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
border-left:5px solid #22c55e;
}

.card.almuerzo{
border-left:5px solid orange;
}

.card.finalizado{
border-left:5px solid red;
}

.nombre{
font-weight:bold;
font-size:15px;
margin-bottom:6px;
}

.detalle{
font-size:13px;
line-height:1.4;
}

button{
margin-top:8px;
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
background:#2563eb;
color:white;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div id="panel">

<h2>COBRADORES</h2>

<div id="lista"></div>

</div>

<div id="map"></div>

<script>

/* FIREBASE */

var firebaseConfig = {

apiKey: "AIzaSyCW__ndth0b9jYO91QF8x6Psp7-lK1-lW4",
authDomain: "gps-cobradores.firebaseapp.com",
databaseURL: "https://gps-cobradores-default-rtdb.firebaseio.com",
projectId: "gps-cobradores"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

/* MAPA */

var map = L.map('map').setView([-2.17,-79.90],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marcadores={};

var rutaMapa=null;

/* LISTAR COBRADORES */

db.ref("cobradores").on("value",function(snapshot){

var datos=snapshot.val();

var lista=document.getElementById("lista");

lista.innerHTML="";

for(var nombre in datos){

var d=datos[nombre];

var estado=d.estado || "-";

var lat=d.latitud;
var lon=d.longitud;

var inicio=d.hora_inicio || "-";
var inicioAlmuerzo=d.hora_inicio_almuerzo || "-";
var finAlmuerzo=d.hora_fin_almuerzo || "-";
var finRuta=d.hora_fin_ruta || "-";

var clase="card";

if(estado=="almuerzo") clase="card almuerzo";

if(estado=="finalizado") clase="card finalizado";

var div=document.createElement("div");

div.className=clase;

div.innerHTML=

'<div class="nombre">'+nombre+'</div>'+

'<div class="detalle">'+
'Estado: '+estado+'<br>'+
'Inicio: '+inicio+'<br>'+
'Inicio Almuerzo: '+inicioAlmuerzo+'<br>'+
'Fin Almuerzo: '+finAlmuerzo+'<br>'+
'Fin Ruta: '+finRuta+
'</div>';

/* BOTON VER RUTA */

if(estado=="finalizado"){

var btn=document.createElement("button");

btn.innerHTML="VER RUTA";

btn.onclick=(function(n){

return function(){

verRuta(n);

}

})(nombre);

div.appendChild(btn);

}

lista.appendChild(div);

/* CLICK EN TARJETA CENTRA MAPA */

if(lat && lon){

div.onclick=(function(lat,lon){

return function(){

map.setView([lat,lon],17);

}

})(lat,lon);

}

/* MARCADORES */

if(lat && lon){

if(!marcadores[nombre]){

marcadores[nombre]=L.marker([lat,lon]).addTo(map);

}else{

marcadores[nombre].setLatLng([lat,lon]);

}

/* POPUP DEL MARCADOR */

marcadores[nombre].bindPopup(

"<b>"+nombre+"</b><br>"+
"Estado: "+estado+"<br>"+
"Inicio: "+inicio+"<br>"+
"Inicio Almuerzo: "+inicioAlmuerzo+"<br>"+
"Fin Almuerzo: "+finAlmuerzo+"<br>"+
"Fin Ruta: "+finRuta

);

}

}

});

/* VER RUTA DEL DIA */

function verRuta(nombre){

var fecha=prompt("Ingrese fecha (YYYY-MM-DD)");

if(!fecha) return;

db.ref("rutas/"+nombre+"/"+fecha).once("value",function(snapshot){

var puntos=snapshot.val();

if(!puntos){

alert("No hay ruta registrada ese día");

return;

}

var coordenadas=[];

for(var id in puntos){

coordenadas.push([
puntos[id].latitud,
puntos[id].longitud
]);

}

if(rutaMapa){

map.removeLayer(rutaMapa);

}

rutaMapa=L.polyline(coordenadas,{
color:"blue",
weight:5
}).addTo(map);

map.fitBounds(rutaMapa.getBounds());

});

}

</script>

</body>

</html>
