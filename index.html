<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control GPS de Cobradores</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:20px;
}

h1{
color:#1a73e8;
}

button{
padding:10px 20px;
margin:5px;
border:none;
background:#1a73e8;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#1a73e8;
color:white;
}

iframe{
width:100%;
height:300px;
border:none;
margin-top:20px;
}

</style>
</head>

<body>

<h1>📍 Panel de Supervisión de Cobradores</h1>

<div>

<button onclick="filtrarDia()">Ver Hoy</button>
<button onclick="filtrarMes()">Ver Mes</button>
<button onclick="filtrarAnio()">Ver Año</button>
<button onclick="mostrarTodo()">Ver Todo</button>

</div>

<table id="tabla">

<thead>

<tr>

<th>Cobrador</th>
<th>Estado</th>
<th>Inicio</th>
<th>Fin</th>
<th>Duración</th>
<th>Ubicación</th>
<th>Mapa</th>

</tr>

</thead>

<tbody>

<tr class="registro" data-fecha="2026-03-04">

<td>Jefferson Quiñónez</td>
<td>Finalizado</td>
<td>12:14:55</td>
<td>12:15:58</td>
<td id="duracion1"></td>
<td>-2.1538102 , -79.5865068</td>
<td>

<a target="_blank"
href="https://www.google.com/maps?q=-2.1538102,-79.5865068">

Ver mapa

</a>

</td>

</tr>

</tbody>

</table>

<iframe id="mapa"
src="https://maps.google.com/maps?q=-2.1538102,-79.5865068&z=15&output=embed">
</iframe>

<script>

function calcularDuracion(){

let inicio="12:14:55"
let fin="12:15:58"

let h1=inicio.split(":")
let h2=fin.split(":")

let inicioSeg= (+h1[0])*3600 + (+h1[1])*60 + (+h1[2])
let finSeg= (+h2[0])*3600 + (+h2[1])*60 + (+h2[2])

let diferencia=finSeg-inicioSeg

let minutos=Math.floor(diferencia/60)
let segundos=diferencia%60

document.getElementById("duracion1").innerHTML=minutos+"m "+segundos+"s"

}

calcularDuracion()

function filtrarDia(){

let hoy=new Date().toISOString().split('T')[0]

filtrarFecha(hoy,"dia")

}

function filtrarMes(){

let hoy=new Date()
let mes=hoy.getMonth()+1

filtrarFecha(mes,"mes")

}

function filtrarAnio(){

let anio=new Date().getFullYear()

filtrarFecha(anio,"anio")

}

function mostrarTodo(){

let registros=document.querySelectorAll(".registro")

registros.forEach(r=>{

r.style.display="table-row"

})

}

function filtrarFecha(valor,tipo){

let registros=document.querySelectorAll(".registro")

registros.forEach(r=>{

let fecha=r.dataset.fecha

if(tipo=="dia"){

r.style.display=fecha===valor?"table-row":"none"

}

if(tipo=="mes"){

r.style.display=fecha.includes("-"+valor+"-")?"table-row":"none"

}

if(tipo=="anio"){

r.style.display=fecha.startsWith(valor)?"table-row":"none"

}

})

}

</script>

</body>
</html>
