<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Supervisor GPS Cobradores</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

#panel{
width:350px;
background:#0f172a;
color:white;
overflow:auto;
padding:15px;
}

#map{
flex:1;
}

.card{

background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
border-left:5px solid #22c55e;

}

.card.almuerzo{
border-left:5px solid orange;
}

.card.finalizado{
border-left:5px solid red;
}

.nombre{
font-weight:bold;
font-size:16px;
margin-bottom:5px;
}

.detalle{
font-size:13px;
line-height:1.4;
}

</style>

</head>

<body>

<div id="panel">

<h2>COBRADORES</h2>

<div id="lista"></div>

</div>

<div id="map"></div>

<script>

var firebaseConfig = {

apiKey: "AIzaSyCW__ndth0b9jYO91QF8x6Psp7-lK1-lW4",
authDomain: "gps-cobradores.firebaseapp.com",
databaseURL: "https://gps-cobradores-default-rtdb.firebaseio.com",
projectId: "gps-cobradores"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var map = L.map('map').setView([-2.17,-79.90],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marcadores={};

db.ref("cobradores").on("value",function(snapshot){

var datos=snapshot.val();

var lista=document.getElementById("lista");

lista.innerHTML="";

for(var nombre in datos){

var d=datos[nombre];

var estado=d.estado || "-";

var lat=d.latitud;
var lon=d.longitud;

var inicio=d.hora_inicio || "-";
var inicioAlmuerzo=d.hora_inicio_almuerzo || "-";
var finAlmuerzo=d.hora_fin_almuerzo || "-";
var finRuta=d.hora_fin_ruta || "-";

var clase="card";

if(estado=="almuerzo") clase="card almuerzo";

if(estado=="finalizado") clase="card finalizado";

var div=document.createElement("div");

div.className=clase;

div.innerHTML=

'<div class="nombre">'+nombre+'</div>'+

'<div class="detalle">'+

'Estado: '+estado+'<br>'+

'Inicio: '+inicio+'<br>'+

'Inicio Almuerzo: '+inicioAlmuerzo+'<br>'+

'Fin Almuerzo: '+finAlmuerzo+'<br>'+

'Fin Ruta: '+finRuta+

'</div>';

lista.appendChild(div);

if(lat && lon){

if(!marcadores[nombre]){

marcadores[nombre]=L.marker([lat,lon]).addTo(map);

}

else{

marcadores[nombre].setLatLng([lat,lon]);

}

marcadores[nombre].bindPopup(

"<b>"+nombre+"</b><br>"+

"Estado: "+estado+"<br>"+

"Inicio: "+inicio+"<br>"+

"Inicio Almuerzo: "+inicioAlmuerzo+"<br>"+

"Fin Almuerzo: "+finAlmuerzo+"<br>"+

"Fin Ruta: "+finRuta

);

div.onclick=function(lat,lon){

return function(){

map.setView([lat,lon],17);

}

}(lat,lon);

}

}

});

</script>

</body>

</html>
