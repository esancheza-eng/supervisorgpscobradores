<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>PANEL SUPERVISOR COBRADORES</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
margin:0;
}

#topbar{
background:#2c3e50;
padding:10px;
}

button{
padding:8px 12px;
margin:4px;
cursor:pointer;
border:none;
background:#3498db;
color:white;
}

#panel{
padding:10px;
background:#f2f2f2;
}

#map{
height:85vh;
}

.alerta{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div id="topbar">

<button onclick="verMapa()">VER MAPA</button>

<button onclick="verActivos()">COBRADORES ACTIVOS</button>

<button onclick="verDetenciones()">DETENCIONES</button>

<button onclick="generarReporte()">REPORTE DEL DÍA</button>

<button onclick="descargarExcel()">DESCARGAR EXCEL</button>

</div>

<div id="panel">

<div id="info"></div>

<div id="alertas"></div>

</div>

<div id="map"></div>

<script>

var firebaseConfig = {
apiKey: "AIzaSyCW__ndth0b9jYO91QF8x6Psp7-lK1-lW4",
authDomain: "gps-cobradores.firebaseapp.com",
databaseURL: "https://gps-cobradores-default-rtdb.firebaseio.com",
projectId: "gps-cobradores"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var map = L.map('map').setView([-2.17,-79.90],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marcadores = {};

var ultimaPosicion = {};
var tiempoParado = {};

var reporte = [];

db.ref("cobradores").on("value",function(snapshot){

var datos = snapshot.val();

if(!datos)return;

document.getElementById("alertas").innerHTML="";

reporte=[];

for(var nombre in datos){

var lat = datos[nombre].latitud;
var lon = datos[nombre].longitud;
var estado = datos[nombre].estado;
var hora = datos[nombre].hora;

if(!lat || !lon)continue;

var posicionActual = lat+","+lon;

if(!marcadores[nombre]){

marcadores[nombre] = L.marker([lat,lon]).addTo(map);

}else{

marcadores[nombre].setLatLng([lat,lon]);

}

marcadores[nombre].bindPopup(
"<b>"+nombre+"</b><br>"+
"Estado: "+estado+"<br>"+
"Hora: "+hora
);

if(ultimaPosicion[nombre] == posicionActual){

if(!tiempoParado[nombre]){
tiempoParado[nombre] = Date.now();
}

var minutos = (Date.now()-tiempoParado[nombre])/60000;

if(minutos > 25){

document.getElementById("alertas").innerHTML +=
"<div class='alerta'>⚠ "+nombre+" detenido "+Math.floor(minutos)+" minutos</div>";

}

}else{

ultimaPosicion[nombre]=posicionActual;
tiempoParado[nombre]=Date.now();

}

reporte.push({
nombre:nombre,
estado:estado,
hora:hora
});

}

});

function verMapa(){

document.getElementById("info").innerHTML="MAPA EN TIEMPO REAL";

}

function verActivos(){

var texto="";

reporte.forEach(function(c){

texto += c.nombre+" - "+c.estado+"<br>";

});

document.getElementById("info").innerHTML=texto;

}

function verDetenciones(){

document.getElementById("info").innerHTML="Revisar alertas arriba";

}

function generarReporte(){

var texto="";

reporte.forEach(function(c){

texto += c.nombre+" | "+c.estado+" | "+c.hora+"<br>";

});

document.getElementById("info").innerHTML=texto;

}

function descargarExcel(){

var csv="COBRADOR,ESTADO,HORA\n";

reporte.forEach(function(c){

csv += c.nombre+","+c.estado+","+c.hora+"\n";

});

var blob = new Blob([csv], {type:"text/csv"});

var url = window.URL.createObjectURL(blob);

var a = document.createElement("a");

a.href=url;

a.download="reporte_cobradores.csv";

a.click();

}

</script>

</body>

</html>
