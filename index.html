<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>SUPERVISOR GPS COBRADORES</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

#panel{
width:350px;
background:#0f172a;
color:white;
overflow:auto;
padding:15px;
}

#map{
flex:1;
}

.card{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border-left:5px solid #22c55e;
cursor:pointer;
}

.card.detencion{
border-left:5px solid orange;
}

.card.finalizado{
border-left:5px solid red;
}

.nombre{
font-weight:bold;
margin-bottom:5px;
}

.detalle{
font-size:13px;
line-height:1.4;
}

button{
margin-top:6px;
padding:6px 10px;
border:none;
border-radius:4px;
background:#2563eb;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="panel">

<h2>COBRADORES</h2>

<button onclick="exportarExcel()">EXPORTAR EXCEL</button>

<div id="lista"></div>

</div>

<div id="map"></div>

<script>

/* FIREBASE */

var firebaseConfig = {

apiKey: "AIzaSyCW__ndth0b9jYO91QF8x6Psp7-lK1-lW4",
authDomain: "gps-cobradores.firebaseapp.com",
databaseURL: "https://gps-cobradores-default-rtdb.firebaseio.com",
projectId: "gps-cobradores"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

/* MAPA */

var map = L.map('map').setView([-2.17,-79.90],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marcadores={};

var datosReporte=[];

/* LISTAR COBRADORES */

db.ref("cobradores").on("value",function(snapshot){

var datos=snapshot.val();

var lista=document.getElementById("lista");

lista.innerHTML="";

datosReporte=[];

for(var nombre in datos){

var d=datos[nombre];

var lat=d.latitud;
var lon=d.longitud;

var estado=d.estado || "-";

var clase="card";

/* DETECTAR DETENIDO */

var detenido="";

if(d.ultima_actualizacion){

var minutos=(Date.now()-d.ultima_actualizacion)/60000;

if(minutos>25 && estado=="trabajando"){

detenido="⚠ detenido "+Math.floor(minutos)+" min";

clase="card detencion";

}

}

/* TARJETA */

var div=document.createElement("div");

div.className=clase;

div.innerHTML=

'<div class="nombre">'+nombre+'</div>'+

'<div class="detalle">'+
'Estado: '+estado+'<br>'+
detenido+
'</div>';

lista.appendChild(div);

/* MARCADOR */

if(lat && lon){

if(!marcadores[nombre]){

marcadores[nombre]=L.marker([lat,lon]).addTo(map);

}

else{

marcadores[nombre].setLatLng([lat,lon]);

}

marcadores[nombre].bindPopup("<b>"+nombre+"</b><br>"+estado);

}

}

});

/* CALCULAR DISTANCIA */

function distancia(lat1,lon1,lat2,lon2){

var R=6371;

var dLat=(lat2-lat1)*Math.PI/180;

var dLon=(lon2-lon1)*Math.PI/180;

var a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

/* EXPORTAR EXCEL */

function exportarExcel(){

var fecha=new Date().toISOString().split('T')[0];

var csv="COBRADOR,KM RECORRIDOS\n";

db.ref("rutas").once("value",function(snapshot){

var rutas=snapshot.val();

for(var cobrador in rutas){

if(!rutas[cobrador][fecha]) continue;

var puntos=rutas[cobrador][fecha];

var total=0;

var anterior=null;

for(var id in puntos){

var p=puntos[id];

if(anterior){

total+=distancia(
anterior.latitud,
anterior.longitud,
p.latitud,
p.longitud
);

}

anterior=p;

}

csv+=cobrador+","+total.toFixed(2)+"\n";

}

descargar(csv);

});

}

/* DESCARGAR */

function descargar(csv){

var blob=new Blob([csv],{type:"text/csv"});

var url=window.URL.createObjectURL(blob);

var a=document.createElement("a");

a.href=url;

a.download="reporte_cobradores.csv";

a.click();

}

</script>

</body>

</html>
